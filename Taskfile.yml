version: '3'

tasks:
  # Top-level tasks
  build:
    desc: Build all packages (verify compilation)
    cmds:
      - go build -v ./...

  test:
    desc: Run tests
    cmds:
      - go test -v ./...

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  clean:
    desc: Clean build artifacts and reports
    cmds:
      - cmd: rm -rf coverage.out coverage.html gosec-report.json
        platforms: [linux, darwin]
      - cmd: if exist coverage.out del coverage.out
        platforms: [windows]
        ignore_error: true
      - cmd: if exist coverage.html del coverage.html
        platforms: [windows]
        ignore_error: true
      - cmd: if exist gosec-report.json del gosec-report.json
        platforms: [windows]
        ignore_error: true

  # Code quality
  lint:
    desc: Run golangci-lint
    cmds:
      - go mod download
      - golangci-lint run --timeout=5m

  format:
    desc: Format code with gofmt
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  tidy:
    desc: Tidy and verify go.mod
    cmds:
      - go mod tidy
      - go mod verify

  # Security
  security:scan:
    desc: Run gosec security scanner
    cmds:
      - gosec -fmt=json -out=gosec-report.json ./...
      - echo "Security report saved to gosec-report.json"

  security:vuln:
    desc: Check for known vulnerabilities with govulncheck
    cmds:
      - govulncheck ./...

  # Development tools
  dev:install-tools:
    desc: Install development and CI tools
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0
      - go install golang.org/x/vuln/cmd/govulncheck@latest
      - go install github.com/securego/gosec/v2/cmd/gosec@latest
      - go install golang.org/x/tools/cmd/goimports@latest
      - go install github.com/gordonklaus/ineffassign@latest
      - echo "All development tools installed successfully!"

  # Linting
  lint:markdown:
    desc: Lint Markdown files
    cmds:
      - npx markdownlint-cli2

  # CI/CD
  ci:all:
    desc: Run all CI checks (format, tidy, lint, vet, test, vuln, lint:markdown)
    cmds:
      - task: format
      - task: tidy
      - task: lint
      - task: vet
      - task: test
      - task: security:vuln
      - task: lint:markdown
      - echo "All CI checks passed!"
