<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify your email address</title>
</head>
<body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background-color:#f4f4f4;">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;background-color:#ffffff;">
        <tr>
            <td style="padding:40px 30px;">
                <h1 style="margin:0 0 20px;color:#333333;font-size:24px;">Verify your email address</h1>
                <p style="margin:0 0 20px;color:#555555;font-size:16px;line-height:1.5;">
                    Hi {{.username}},
                </p>
                <p style="margin:0 0 30px;color:#555555;font-size:16px;line-height:1.5;">
                    Click the button below to verify your email address.
                </p>
                <table cellpadding="0" cellspacing="0">
                    <tr>
                        <td style="background-color:#2563eb;border-radius:6px;">
                            <a href="{{.verify_url}}" style="display:inline-block;padding:14px 30px;color:#ffffff;text-decoration:none;font-size:16px;font-weight:bold;">
                                Verify Email
                            </a>
                        </td>
                    </tr>
                </table>
                <p style="margin:30px 0 0;color:#999999;font-size:13px;line-height:1.5;">
                    If you didn't request this, you can safely ignore this email.
                </p>
                <p style="margin:10px 0 0;color:#999999;font-size:13px;line-height:1.5;">
                    Or copy this link: {{.verify_url}}
                </p>
            </td>
        </tr>
    </table>
</body>
</html>
